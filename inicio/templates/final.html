{% extends "base.html" %}

{% block title %}Final{% endblock %}

{% block content %}

<style>
/* Corazones flotando */
.heart {
    position: fixed;
    color: rgba(255, 0, 100, 0.5);
    font-size: 30px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh) scale(0.8); opacity: 0.8; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}

/* Fuegos artificiales */
.firework {
    position: fixed;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    animation: explode 1.5s ease-out infinite;
}

@keyframes explode {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(20); opacity: 0; }
}

/* Ramo oculto */
#flowers {
    display: none;
    margin-top: 30px;
    font-size: 60px;
}
</style>

<h2>🎉 Summary 🎉</h2>

<div style="
    background: #ffffffcc;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    max-width: 500px;
    margin: auto;
    text-align: center;
">
    <h3>we have a date!!</h3>

    <p><strong>Sylwia</strong> {{ nombre }}</p>

    <p><strong>between:</strong> {{ fecha_inicio }}</p>
    <p><strong>and:</strong> {{ fecha_fin }}</p>
     <p><strong>Clicks for get your reward also send me a screenshot</strong></p>
    <br>
    <button onclick="showFlowers()" style="
        padding: 15px 30px;
        background: #ff4081;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
    ">
        Claim Gift 🎁
    </button>

    <div id="flowers">💐💐💐</div>
</div>

<script>
// Corazones
for (let i = 0; i < 20; i++) {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDelay = Math.random() * 5 + "s";
    heart.innerHTML = "❤";
    document.body.appendChild(heart);
}

// Fuegos artificiales
for (let i = 0; i < 5; i++) {
    let fw = document.createElement("div");
    fw.classList.add("firework");
    fw.style.left = Math.random() * 100 + "vw";
    fw.style.top = Math.random() * 100 + "vh";
    fw.style.background = `hsl(${Math.random()*360}, 100%, 60%)`;
    fw.style.animationDelay = Math.random() * 2 + "s";
    document.body.appendChild(fw);
}

// Mostrar ramo
function showFlowers() {
    document.getElementById("flowers").style.display = "block";
}
</script>

{% endblock %}
