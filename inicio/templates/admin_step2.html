{% extends "base.html" %}

{% block title %}Paso 2{% endblock %}

{% block content %}

<h2>Do tou have a 2mts boyfriend What could break my legs.</h2>
<p>Choose an option:</p>

<div style="
    background: #e9f0ff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 400px;
">

    <label><input type="radio" name="p4" value="yes" onclick="handleYes()"> Yes</label><br>
    <label><input type="radio" name="p4" value="no" onclick="handleNo()"> No</label><br>

</div>

<!-- Modal 1 -->
<div id="modal1" style="
    display:none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
">
    <div style="
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 300px;
        margin: 150px auto;
        text-align: center;
    ">
        <h3>Are you sure?</h3>
        <button onclick="modal1Yes()">Yes</button>
        <button onclick="closeModal1()">No</button>
    </div>
</div>

<!-- Modal 2 -->
<div id="modal2" style="
    display:none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
">
    <div style="
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 300px;
        margin: 150px auto;
        text-align: center;
    ">
        <h3>Very sure?</h3>
        <button onclick="modal2Yes()">Yes</button>
        <button onclick="closeModal2()">No</button>
    </div>
</div>

<script>
function handleYes() {
    document.getElementById("modal1").style.display = "block";
}

function handleNo() {
    window.location.href = "/why/";   // ← Nueva ruta
}

function closeModal1() {
    document.getElementById("modal1").style.display = "none";
    document.querySelector('input[name="p4"][value="yes"]').checked = false;
}

function modal1Yes() {
    document.getElementById("modal1").style.display = "none";
    document.getElementById("modal2").style.display = "block";
}

function closeModal2() {
    document.getElementById("modal2").style.display = "none";
    document.querySelector('input[name="p4"][value="yes"]').checked = false;
}

function modal2Yes() {
    document.getElementById("modal2").style.display = "none";
    alert("Confirmado");
}
</script>


{% endblock %}
